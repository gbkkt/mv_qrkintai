<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>movel 勤怠スキャナ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

.header { padding: 14px 28px; border-bottom: 0.5px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header-left { display: flex; align-items: center; gap: 10px; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #60a5fa; }
.header h1 { font-size: 14px; font-weight: 500; }
.time { font-size: 13px; color: rgba(255,255,255,0.35); font-variant-numeric: tabular-nums; }

.main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }

.camera-col { position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
#videoEl { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
#debugCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; pointer-events: none; }

.scan-frame { position: relative; z-index: 2; width: 260px; height: 260px; }
.corner { position: absolute; width: 32px; height: 32px; }
.corner-tl { top: 0; left: 0; border-top: 3px solid rgba(255,255,255,0.9); border-left: 3px solid rgba(255,255,255,0.9); border-radius: 2px 0 0 0; }
.corner-tr { top: 0; right: 0; border-top: 3px solid rgba(255,255,255,0.9); border-right: 3px solid rgba(255,255,255,0.9); border-radius: 0 2px 0 0; }
.corner-bl { bottom: 0; left: 0; border-bottom: 3px solid rgba(255,255,255,0.9); border-left: 3px solid rgba(255,255,255,0.9); border-radius: 0 0 0 2px; }
.corner-br { bottom: 0; right: 0; border-bottom: 3px solid rgba(255,255,255,0.9); border-right: 3px solid rgba(255,255,255,0.9); border-radius: 0 0 2px 0; }
.scan-line { position: absolute; left: 8px; right: 8px; height: 2px; background: linear-gradient(90deg, transparent, #60a5fa, transparent); animation: scan 2s ease-in-out infinite; z-index: 3; }
@keyframes scan { 0% { top: 8px; } 50% { top: 244px; } 100% { top: 8px; } }

.placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 1; }
.placeholder svg { opacity: 0.15; }
.placeholder p { font-size: 13px; color: rgba(255,255,255,0.25); text-align: center; line-height: 1.7; }

.mode-indicator { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 4; padding: 6px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; white-space: nowrap; }
.debug-text { position: absolute; top: 8px; left: 8px; z-index: 5; background: rgba(0,0,0,0.6); padding: 3px 8px; border-radius: 4px; font-size: 10px; color: #60a5fa; }

.freeze-overlay { position: absolute; inset: 0; z-index: 6; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
.freeze-overlay.show { opacity: 1; }
.freeze-msg { text-align: center; }
.freeze-name { font-size: 36px; font-weight: 400; margin-bottom: 6px; }
.freeze-sub { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
.freeze-countdown { font-size: 56px; font-weight: 200; color: rgba(255,255,255,0.2); }

.side-col { border-left: 0.5px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; background: #111; }

.mode-section { padding: 28px; border-bottom: 0.5px solid rgba(255,255,255,0.06); }
.section-label { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.25); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px; }
.mode-btns { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.mode-btn { padding: 22px 4px; border-radius: 10px; border: 0.5px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.4); font-size: 18px; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.12s; }
.mode-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
.mode-btn.active { border-color: #60a5fa; background: rgba(96,165,250,0.15); color: #60a5fa; }

.log-section { flex: 1; padding: 28px; overflow: hidden; display: flex; flex-direction: column; }
.log-list { flex: 1; overflow-y: auto; }
.log-list::-webkit-scrollbar { width: 3px; }
.log-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.log-empty { font-size: 14px; color: rgba(255,255,255,0.2); text-align: center; padding: 24px 0; }
.log-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); animation: fadeIn 0.2s ease; }
.log-item:last-child { border-bottom: none; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
.badge { font-size: 13px; font-weight: 500; padding: 4px 10px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; }
.b-出勤 { background: rgba(34,197,94,0.12);  color: #86efac; }
.b-退勤 { background: rgba(96,165,250,0.12); color: #93c5fd; }
.b-早退 { background: rgba(251,191,36,0.12); color: #fde68a; }
.b-外出 { background: rgba(167,139,250,0.12);color: #c4b5fd; }
.b-戻り { background: rgba(52,211,153,0.12); color: #6ee7b7; }
.log-name { font-size: 16px; font-weight: 500; flex: 1; }
.log-time { font-size: 14px; color: rgba(255,255,255,0.25); font-variant-numeric: tabular-nums; }

.bottom-bar { padding: 14px 28px; border-top: 0.5px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: space-between; }
.status-wrap { display: flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(255,255,255,0.3); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.btn { font-size: 14px; padding: 10px 20px; border-radius: 8px; cursor: pointer; border: 0.5px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); transition: background 0.12s; }
.btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left"><div class="logo-dot"></div><h1>movel 勤怠スキャナ</h1></div>
  <span class="time" id="clock">--:--:--</span>
</div>
<div class="main">
  <div class="camera-col" id="cameraCol">
    <video id="videoEl" autoplay playsinline muted style="display:none;"></video>
    <canvas id="debugCanvas"></canvas>
    <div id="scanFrame" style="display:none;" class="scan-frame">
      <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div><div class="corner corner-br"></div>
      <div class="scan-line"></div>
    </div>
    <div class="placeholder" id="placeholder">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <p>カメラを起動してください</p>
    </div>
    <div class="mode-indicator" id="modeIndicator" style="display:none;"></div>
    <div class="debug-text" id="debugText" style="display:none;"></div>
    <div class="freeze-overlay" id="freezeOverlay">
      <div class="freeze-msg">
        <div class="freeze-name" id="freezeName"></div>
        <div class="freeze-sub" id="freezeSub"></div>
        <div class="freeze-countdown" id="freezeCount"></div>
      </div>
    </div>
  </div>
  <div class="side-col">
    <div class="mode-section">
      <div class="section-label">打刻種別</div>
      <div class="mode-btns">
        <button class="mode-btn active" data-code="1" data-label="出勤" onclick="selectMode(this)">出勤</button>
        <button class="mode-btn" data-code="2" data-label="退勤" onclick="selectMode(this)">退勤</button>
        <button class="mode-btn" data-code="5" data-label="早退" onclick="selectMode(this)">早退</button>
        <button class="mode-btn" data-code="3" data-label="外出" onclick="selectMode(this)">外出</button>
        <button class="mode-btn" data-code="4" data-label="戻り" onclick="selectMode(this)">戻り</button>
      </div>
    </div>
    <div class="log-section">
      <div class="section-label">打刻ログ</div>
      <div class="log-list" id="logList"><div class="log-empty">スキャン待機中...</div></div>
    </div>
    <div class="bottom-bar">
      <div class="status-wrap"><div class="status-dot"></div><span id="statusText">待機中</span></div>
      <button class="btn" id="mainBtn" onclick="startCamera()">カメラ起動</button>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<script>
const KOT_TOKEN = 'YOUR_KOT_TOKEN_HERE';
const employees = {
  'movel_yuki_001': { name: 'Yuki', employeeKey: 'YOUR_EMPLOYEE_KEY' },
  'movel_taro_002': { name: 'Taro', employeeKey: 'YOUR_EMPLOYEE_KEY_2' },
};
const FREEZE_SEC = 4;
const modeColors = { '出勤':'#22c55e','退勤':'#60a5fa','早退':'#fbbf24','外出':'#a78bfa','戻り':'#34d399' };
let scanning = false, frozen = false, frameCount = 0, threshold = 128, freezeTimer = null;
let currentMode = { code: 1, label: '出勤' };

setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ja-JP', { hour12: false });
}, 1000);

function selectMode(el) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentMode = { code: parseInt(el.dataset.code), label: el.dataset.label };
  updateModeIndicator();
}

function updateModeIndicator() {
  const ind = document.getElementById('modeIndicator');
  const color = modeColors[currentMode.label] || '#60a5fa';
  ind.textContent = currentMode.label + ' モード';
  ind.style.cssText = 'display:block; position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:4; background:rgba(0,0,0,0.65); border:0.5px solid ' + color + '; color:' + color + '; padding:6px 18px; border-radius:20px; font-size:13px; font-weight:500; white-space:nowrap;';
}

function addLog(name, label) {
  const list = document.getElementById('logList');
  const empty = list.querySelector('.log-empty');
  if (empty) empty.remove();
  const timeStr = new Date().toLocaleTimeString('ja-JP', { hour12: false });
  const item = document.createElement('div');
  item.className = 'log-item';
  item.innerHTML = '<span class="badge b-' + label + '">' + label + '</span><span class="log-name">' + name + '</span><span class="log-time">' + timeStr + '</span>';
  list.insertBefore(item, list.firstChild);
}

function freeze(name, label) {
  frozen = true;
  const color = modeColors[label] || '#fff';
  document.getElementById('freezeName').textContent = name;
  document.getElementById('freezeName').style.color = color;
  document.getElementById('freezeSub').textContent = label + ' 打刻完了';
  document.getElementById('freezeOverlay').classList.add('show');
  let count = FREEZE_SEC;
  document.getElementById('freezeCount').textContent = count;
  if (freezeTimer) clearInterval(freezeTimer);
  freezeTimer = setInterval(() => {
    count--;
    document.getElementById('freezeCount').textContent = count;
    if (count <= 0) {
      clearInterval(freezeTimer);
      document.getElementById('freezeOverlay').classList.remove('show');
      frozen = false;
    }
  }, 1000);
}

async function punch(employeeId) {
  const emp = employees[employeeId];
  if (!emp) return;
  addLog(emp.name, currentMode.label);
  freeze(emp.name, currentMode.label);
}

function processImage(ctx, w, h) {
  const imageData = ctx.getImageData(0, 0, w, h);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
    const val = gray > threshold ? 255 : 0;
    data[i] = data[i+1] = data[i+2] = val;
  }
  ctx.putImageData(imageData, 0, 0);
  return ctx.getImageData(0, 0, w, h);
}

async function startCamera() {
  const btn = document.getElementById('mainBtn');
  btn.textContent = '起動中...';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 } } });
    const video = document.getElementById('videoEl');
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('scanFrame').style.display = 'block';
    document.getElementById('debugText').style.display = 'block';
    document.getElementById('statusText').textContent = 'スキャン中';
    updateModeIndicator();
    btn.textContent = '停止';
    btn.onclick = stopCamera;
    scanning = true;
    requestAnimationFrame(scanLoop);
  } catch(e) {
    document.getElementById('statusText').textContent = 'カメラ許可が必要です';
    btn.textContent = 'カメラ起動';
  }
}

function stopCamera() {
  scanning = false; frozen = false;
  if (freezeTimer) clearInterval(freezeTimer);
  const video = document.getElementById('videoEl');
  if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
  video.style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('scanFrame').style.display = 'none';
  document.getElementById('modeIndicator').style.display = 'none';
  document.getElementById('debugText').style.display = 'none';
  document.getElementById('freezeOverlay').classList.remove('show');
  document.getElementById('statusText').textContent = '待機中';
  const btn = document.getElementById('mainBtn');
  btn.textContent = 'カメラ起動';
  btn.onclick = startCamera;
}

function scanLoop() {
  if (!scanning) return;
  if (frozen) { requestAnimationFrame(scanLoop); return; }
  const video = document.getElementById('videoEl');
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    frameCount++;
    const canvas = document.getElementById('debugCanvas');
    const ctx = canvas.getContext('2d');
    const W = video.videoWidth, H = video.videoHeight;
    canvas.width = W; canvas.height = H;
    ctx.drawImage(video, 0, 0, W, H);
    let code = null;
    let imageData = ctx.getImageData(0, 0, W, H);
    code = jsQR(imageData.data, W, H, { inversionAttempts: 'attemptBoth' });
    if (!code) {
      ctx.drawImage(video, 0, 0, W, H);
      imageData = processImage(ctx, W, H);
      code = jsQR(imageData.data, W, H, { inversionAttempts: 'attemptBoth' });
    }
    if (!code) {
      for (const th of [100, 160, 80, 200]) {
        threshold = th;
        ctx.drawImage(video, 0, 0, W, H);
        imageData = processImage(ctx, W, H);
        code = jsQR(imageData.data, W, H, { inversionAttempts: 'attemptBoth' });
        if (code) break;
      }
      threshold = 128;
    }
    document.getElementById('debugText').textContent = W + 'x' + H + ' f:' + frameCount + (code ? ' ✅' : '');
    if (code) punch(code.data);
  }
  requestAnimationFrame(scanLoop);
}
</script>
</body>
</html>
